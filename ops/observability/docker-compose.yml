# Vacation Station 14 — Observability stack (vs-2p3)
#
# Prometheus (metrics) + Loki (logs) + Grafana (visualization), co-hosted on
# the game-server box. Designed to be self-contained:
#
# - All three services sit on an internal bridge network `observability`.
# - Prometheus and Loki bind ONLY to 127.0.0.1 on the host, so they are not
#   reachable from the public internet. The operator can still curl them for
#   debugging.
# - Grafana listens on 127.0.0.1:3200 and is fronted by Caddy for HTTPS from
#   the outside world (see docs/OPERATIONS.md "Observability").
# - Prometheus scrapes the SS14 server on the host via `host.docker.internal`
#   (Docker's host-gateway alias) on port 44880.
# - Data is persisted to named volumes so container rebuilds don't drop state.
#
# Operator bootstrap is documented in docs/OPERATIONS.md. Before first `up`:
#   1. ops/observability/secrets/grafana_admin_password.txt  (not in git)
#   2. ops/observability/.env                                (not in git)
# Examples of both live alongside this file.
#
# Image pins — chosen as currently-stable releases in the Prometheus 2.5x,
# Loki 3.x, and Grafana 11 lines. Bump deliberately; don't float tags.

name: vs14-observability

networks:
  observability:
    driver: bridge

volumes:
  mapserver-files:
  mapserver-build:
  cdn-db:
  cdn-manifest:
  cdn-builds:
  prometheus-data:
  loki-data:
  grafana-data:

secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    networks: [observability]
    # Expose only to the loopback on the host. Operators on the box can curl
    # localhost:9090; the internet cannot.
    ports:
      - "127.0.0.1:9090:9090"
    # host.docker.internal resolves to the Docker bridge gateway, which lets
    # us scrape the SS14 game server running on the host at 127.0.0.1:44880.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  loki:
    image: grafana/loki:3.2.1
    restart: unless-stopped
    networks: [observability]
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: ["-config.file=/etc/loki/config.yml"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    networks: [observability]
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    # Grafana also needs to reach the Postgres instance on the host for the
    # dashboards that visualise SS14.Admin data (grafana-postgresql-datasource).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Published on 3200 (not 3000 — that collides with Node.js / Vite /
      # Vercel dev servers that operators often run). Container-internal
      # port stays 3000 (grafana's default). Bumps here must be mirrored
      # in docs/OPERATIONS.md, docs/NETWORKING.md, docs/DEVELOPMENT.md,
      # flake.nix (dev stack), and .claude/skills/nix/SKILL.md.
      - "127.0.0.1:3200:3000"
    environment:
      # Admin password is sourced from a docker secret so the value never
      # appears in env / docker inspect output. Operator populates
      # ./secrets/grafana_admin_password.txt (ignored by git).
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      # `grafana-postgresql-datasource` is a CORE plugin as of Grafana 11.x —
      # bundled with the image, not separately installable. Attempting to
      # install it via GF_INSTALL_PLUGINS fails the startup hook with
      # "forbiddenCorePluginInstall". Our provisioning + dashboards still
      # reference `type: grafana-postgresql-datasource` (the core attr name),
      # so the datasource resolves without any plugin install step.
      # POSTGRES_PASSWORD is expanded into the provisioned datasource below.
      # Operator supplies it via ops/observability/.env (gitignored).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in ops/observability/.env}
    secrets:
      - grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # SS14.MapServer — map renderer + manager (vs-2nk)
  # ---------------------------------------------------------------------------
  # Runs Content.MapRenderer inside a Docker container (sidesteps the SIGABRT
  # we hit running it directly under systemd; upstream expects + disables core
  # dumps to absorb renderer crashes). Co-hosted in the observability compose
  # for ops simplicity — one `docker compose up -d` brings everything up.
  #
  # Reuses host postgres (DB `vacation_station_mapserver`, owner vs14). Bound
  # to loopback only; nginx fronts the API at /maps/api/.
  #
  # Data volumes:
  #   mapserver-files  — rendered map images + metadata (consumed by MapViewer)
  #   mapserver-build  — working dir for git clone + dotnet build
  mapserver:
    # Custom image extends ghcr.io/space-wizards/ss14.mapserver:latest
    # with dotnet 10 SDK so Content.MapRenderer (pinned to .NET 10 via
    # our repo's global.json) can build inside the container.
    build:
      context: ../mapserver
      dockerfile: Dockerfile
    image: vs14-mapserver:latest
    container_name: vs14-mapserver
    restart: unless-stopped
    # Host networking so the container reaches postgres on 127.0.0.1:5432
    # (docker's bridge + ufw interact awkwardly for host-postgres access
    # via the docker0 gateway). ASPNETCORE_URLS binds directly to
    # loopback:5218 on the host — no ports: mapping needed.
    network_mode: host
    volumes:
      - ../mapserver/appsettings.Production.yaml:/app/appsettings.Production.yaml:ro
      - mapserver-files:/app/data
      - mapserver-build:/app/build
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://127.0.0.1:5218"
      # dotnet first-run config writes to $HOME/.dotnet; default HOME for
      # the non-root container user isn't writable. Point it at /app/data
      # which is a mounted volume.
      DOTNET_CLI_HOME: /tmp
      HOME: /tmp
      # ASP.NET Core env config: keys use `__` as section separator.
      # These override the YAML file for secrets.
      # Password is plain hex (no special chars). See setup.postgres.sh for
      # the rotation procedure — regenerate as `openssl rand -hex 32` to
      # avoid Npgsql connection-string parser confusion around `=`/`+`/`/`.
      ConnectionStrings__default: "Server=127.0.0.1;Port=5432;Database=vacation_station_mapserver;User Id=vs14;Password=${POSTGRES_PASSWORD}"
      Auth__ApiKey: ${MAPSERVER_API_KEY}
    # Core dumps off — each renderer crash otherwise writes ~1GB to disk
    ulimits:
      core:
        soft: 0
        hard: 0

  # ---------------------------------------------------------------------------
  # Robust.Cdn — versioned client build distributor (vs-3mv)
  # ---------------------------------------------------------------------------
  # Stores VS14's Robust.Server + Content.Client builds, serves manifest
  # + delta downloads. Watchdog flips UpdateType to Manifest pointing at
  # https://ss14.zig.computer/cdn/; launcher fetches delta updates
  # instead of re-downloading 192 MB per version.
  #
  # Data (SQLite DB + manifest + blob store) persists via named volumes.
  # Port 8080 maps to 127.0.0.1:8087 on host (nginx proxies /cdn/ there).
  cdn:
    image: ghcr.io/space-wizards/robust.cdn:latest
    container_name: vs14-cdn
    restart: unless-stopped
    networks: [observability]
    ports:
      - "127.0.0.1:8087:8080"
    volumes:
      - ../cdn/appsettings.yaml:/app/appsettings.Production.yaml:ro
      - cdn-db:/database
      - cdn-manifest:/manifest
      - cdn-builds:/builds
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      # Per-fork upload token — populated from env so the secret
      # never lands in the committed YAML. Rotate by changing the
      # CDN_UPDATE_TOKEN in ops/observability/.env + `docker compose
      # restart cdn`.
      Manifest__Forks__vacation-station__UpdateToken: "${CDN_UPDATE_TOKEN}"
