# Vacation Station 14 — Loki single-binary config (vs-2p3)
#
# Running Loki monolithic mode (all components in one process, filesystem
# storage, no clustering). This is the recommended shape for single-host
# deployments serving a few thousand log streams — which is exactly what
# we are. No S3 dependency; data lives in /loki inside the container,
# backed by the `loki-data` named volume.
#
# Retention: 30 days (720h). Loki applies retention via the compactor on a
# schedule; older chunks are deleted from the filesystem store.
#
# Schema v13 + tsdb is Loki 3.x's current best-practice pairing.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

limits_config:
  # Loki 3.x removed the global enforce flag; per-tenant retention drives
  # compactor-based deletion.
  retention_period: 720h
  # Allow a reasonable ingest rate for a busy SS14 instance without letting
  # a runaway logger melt the box.
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_series: 5000

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  ring:
    kvstore:
      store: inmemory
  enable_api: true

analytics:
  reporting_enabled: false
