# Vacation Station 14 — nginx vhost for ss14.zig.computer
#
# Paths exposed through the reverse proxy:
#
#   /client.zip            — public client download (rewrites to
#                            watchdog's nested binaries path so the
#                            advertised download_url is clean)
#   /admin/*               — watchdog admin API (gated by ApiToken;
#                            HTTPS here gets us wire protection)
#   /                      — 404 placeholder; future splash page
#                            from vs-2dr can replace this block
#
# Game-protocol traffic on port 1212 (TCP for /info, UDP for Lidgren)
# remains direct to origin — nginx does not proxy it. The public ufw
# rule on :1212 stays open.
#
# TLS is provisioned by certbot (Let's Encrypt). certbot will rewrite
# this file in place to add the listen 443 ssl block + cert paths;
# the http block below is what gets installed initially so the ACME
# HTTP-01 challenge can succeed before the cert exists.

server {
    listen 80;
    listen [::]:80;
    server_name ss14.zig.computer;

    # Large binary download — disable buffering so nginx streams
    # straight through instead of spooling to /tmp. Raise the body
    # size too, even though this path is a GET — Some SS14.Launcher
    # versions do conditional requests with If-None-Match.
    client_max_body_size 0;

    # ---- Public client download ----
    # The watchdog advertises the long /instances/<instance>/binaries/...
    # path in build.download_url, so we must proxy that path. /client.zip
    # is a convenience alias for manual testing.
    # SS14.Client.zip is ~192 MB; stream through without buffering.

    location /instances/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    location = /client.zip {
        proxy_pass http://127.0.0.1:5000/instances/vacation-station/binaries/SS14.Client.zip;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # ---- Watchdog admin API ----
    # Watchdog does its own HTTP Basic auth against the ApiToken
    # stored in /opt/ss14-watchdog/appsettings.yml. nginx just
    # proxies + terminates TLS.

    location /admin/ {
        # Trailing slash on BOTH sides → nginx strips /admin/ prefix
        # before forwarding to the watchdog.
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    # ---- Placeholder root ----
    # vs-2dr will replace this with the real website.

    location / {
        return 404 "Vacation Station 14 — no splash yet.\n";
        default_type text/plain;
    }
}
