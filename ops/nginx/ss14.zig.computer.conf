# Vacation Station 14 — nginx vhost for ss14.zig.computer
#
# Paths exposed through the reverse proxy:
#
#   /                      — placeholder landing page from web/placeholder/;
#                            vs-2dr replaces with the real site
#   /recipes/              — ss14-cookbook static output (vs-1vy)
#   /maps/                 — SS14.MapServer (vs-236)
#   /client.zip            — public client download (rewrites to
#                            watchdog's nested binaries path)
#   /instances/            — watchdog passthrough (launcher's advertised
#                            build.download_url hits here)
#   /admin/                — watchdog admin API (gated by ApiToken)
#
# Game-protocol traffic on port 1212 (TCP /info + UDP Lidgren) is NOT
# proxied — direct to Robust.Server. See docs/NETWORKING.md.
#
# TLS is provisioned by certbot. The committed template stays HTTP-only
# so no cert paths / keys reach source control; certbot rewrites the
# /etc/nginx/... copy in place during `sudo certbot --nginx`.

server {
    listen 80;
    listen [::]:80;
    server_name ss14.zig.computer;

    client_max_body_size 0;

    # ---- Root (placeholder landing page) ----
    # web/placeholder/ is served directly as static files. The real
    # site (vs-2dr) replaces this with a built website.

    root /opt/vacation-station/web/placeholder;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    # ---- Cookbook (vs-1vy) ----
    # ss14-cookbook outputs static HTML; we build + rsync to
    # /var/www/vs14-recipes/ via ops/cookbook/build.sh.

    location /recipes/ {
        alias /var/www/vs14-recipes/;
        try_files $uri $uri/ /recipes/index.html;
    }

    # ---- Maps (vs-236) ----
    # SS14.MapViewer is a static web app (interactive zoomable map
    # browser). Its build output lands at /var/www/vs14-maps/. Any
    # MapServer backend it may need (render on demand) would run on
    # a loopback port and get routed via a sub-location below; until
    # that's configured MapViewer can work from pre-rendered tiles
    # generated by Content.MapRenderer.

    location /maps/ {
        alias /var/www/vs14-maps/;
        try_files $uri $uri/ /maps/index.html;
    }

    # ---- Public client download ----
    # The watchdog advertises the long /instances/<instance>/binaries/...
    # path in build.download_url. Also provide /client.zip as a short
    # alias for manual testing.

    location /instances/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    location = /client.zip {
        proxy_pass http://127.0.0.1:5000/instances/vacation-station/binaries/SS14.Client.zip;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # ---- Watchdog admin API ----

    location /admin/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
}
