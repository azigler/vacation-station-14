# Vacation Station 14 — nginx vhost for ss14.zig.computer
#
# Paths exposed through the reverse proxy:
#
#   /                      — placeholder landing page from web/placeholder/;
#                            vs-2dr replaces with the real site
#   /recipes/              — ss14-cookbook static output (vs-1vy)
#   /guidebook/            — static render of the in-game Guidebook (vs-1e5)
#   /maps/                 — SS14.MapServer (vs-236)
#   /client.zip            — public client download (rewrites to
#                            watchdog's nested binaries path)
#   /instances/            — watchdog passthrough (launcher's advertised
#                            build.download_url hits here)
#   /watchdog/             — SS14.Watchdog admin API (gated by
#                            ApiToken). Named /watchdog/ so /admin/
#                            stays free for SS14.Admin (vs-35d).
#
# Game-protocol traffic on port 1212 (TCP /info + UDP Lidgren) is NOT
# proxied — direct to Robust.Server. See docs/NETWORKING.md.
#
# TLS is provisioned by certbot. The committed template stays HTTP-only
# so no cert paths / keys reach source control; certbot rewrites the
# /etc/nginx/... copy in place during `sudo certbot --nginx`.

server {
    listen 80;
    listen [::]:80;
    server_name ss14.zig.computer;

    client_max_body_size 0;

    # ---- Root (placeholder landing page) ----
    # web/placeholder/ is served directly as static files. The real
    # site (vs-2dr) replaces this with a built website.

    root /opt/vacation-station/web/placeholder;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    # ---- Cookbook (vs-1vy) ----
    # ss14-cookbook outputs static HTML; we build + rsync to
    # /var/www/vs14-recipes/ via ops/cookbook/build.sh.

    location /recipes/ {
        alias /var/www/vs14-recipes/;
        try_files $uri $uri/ /recipes/index.html;
    }

    # ---- Guidebook (vs-1e5) ----
    # Static render of the in-game Guidebook; ops/guidebook/build.sh
    # writes HTML into /var/www/vs14-guidebook/ on a daily timer.

    location /guidebook/ {
        alias /var/www/vs14-guidebook/;
        try_files $uri $uri/ /guidebook/index.html;
    }

    # ---- Writer (vs-v69) ----
    # RMC14-document-simu static output; build populates
    # /var/www/vs14-writer/ via ops/document-sim/.

    location /writer/ {
        alias /var/www/vs14-writer/;
        try_files $uri $uri/ /writer/index.html;
    }

    # ---- Maps (vs-236 / vs-2nk) ----
    # /maps/       → static MapViewer build (populates to /var/www/vs14-maps/
    #                once vs-236 builds succeed — currently "coming soon" stub)
    # /maps/api/   → SS14.MapServer (vs-2nk) backend; docker-composed at
    #                127.0.0.1:5218. MapViewer's frontend queries this.
    #                Writes (trigger renders, manage maps) require the
    #                X-API-Key header; reads are public.

    location /maps/api/ {
        proxy_pass http://127.0.0.1:5218/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # MapServer also serves the raw map tile PNGs via /tile/... at the
    # API root; expose the same way so MapViewer can fetch them.
    location /maps/tile/ {
        proxy_pass http://127.0.0.1:5218/tile/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    location /maps/ {
        alias /var/www/vs14-maps/;
        try_files $uri $uri/ /maps/index.html;
    }

    # ---- Public client download ----
    # The watchdog advertises the long /instances/<instance>/binaries/...
    # path in build.download_url. Also provide /client.zip as a short
    # alias for manual testing.

    location /instances/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    location = /client.zip {
        proxy_pass http://127.0.0.1:5000/instances/vacation-station/binaries/SS14.Client.zip;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # ---- CDN (vs-3mv) ----
    # Robust.Cdn serves versioned client/server builds with delta
    # manifests. Container-internal routes (/fork/..., /version/...)
    # don't honor PathBase, so we strip /cdn/ here via the trailing
    # slash on proxy_pass.

    location /cdn/ {
        proxy_pass http://127.0.0.1:8087/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        # Build uploads + delta downloads can be large; no body-size cap.
        client_max_body_size 0;
        proxy_read_timeout 300s;
    }

    # ---- Watchdog admin API ----

    location /watchdog/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    # ---- SS14.Admin (vs-35d) ----
    # Bundled SS14.Admin panel — deploy-as-is submodule at
    # external/ss14-admin/, configured via ops/ss14-admin/. The
    # container listens on 127.0.0.1:5427 with PathBase=/admin, so
    # we proxy the whole /admin/ prefix through without stripping.
    #
    # Host + X-Forwarded-Proto are load-bearing: SS14.Admin builds
    # the OIDC redirect URI from these, and Wizden only accepts
    # https://ss14.zig.computer/admin/signin-oidc. ForwardProxies
    # in appsettings trusts 127.0.0.1 + the docker bridge range so
    # these headers are honored.

    location /admin/ {
        proxy_pass http://127.0.0.1:5427;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
}
